name: Sales Chatbot Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild of knowledge base'
        required: false
        default: 'false'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test API endpoints
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        QDRANT_URL: ${{ secrets.QDRANT_URL }}
        QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      run: |
        python -m pytest tests/ -v || echo "No tests found, skipping..."

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Process meeting data
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        QDRANT_URL: ${{ secrets.QDRANT_URL }}
        QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        COLLECTION_NAME: ${{ secrets.COLLECTION_NAME }}
      run: |
        if [ -d "data/raw" ] && [ "$(ls -A data/raw)" ]; then
          echo "Processing meeting data..."
          python process_meetings.py
          python chunking.py
          python ingest_qdrant.py
          python ensure_indexes.py
        else
          echo "No meeting data found in data/raw directory"
        fi
    
    - name: Build Docker image
      run: |
        docker build -t sales-chatbot .
    
    - name: Deploy to Render
      if: success()
      run: |
        echo "Deployment would happen here"
        echo "Configure your deployment service (Render/Railway/etc.)"